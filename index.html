<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icn.ico" type="image/x-icon">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <header class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="images/rana-logo.png" alt="Logo">
            </a>

            <div class="search-group">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search art...">
                </div>
                <div class="filter-wrapper">
                    <select class="filter-select">
                        <option value="All" selected>All Tags</option>
                    </select>
                    <i class="fa-solid fa-filter"></i>
                </div>
            </div>
        </div>

        <nav class="category-nav">
            <a href="#ForYou" class="pill active">For You</a>
            <a href="#Artist'sStory" class="pill">Artist's Story</a>
            <a href="#ArtStory" class="pill">Art Story</a>
            <a href="#Country'sStory" class="pill">Country's Story</a>
            <a href="#ColorsPallets" class="pill">Color Palettes</a>
        </nav>
    </header>

    <main class="container">

        <section class="hero-section">
            <div class="hero-banner">
                <img src="images/hero.png" alt="Featured Art">
                <div class="hero-overlay">
                    <h1>Explore Creativity</h1>
                </div>
            </div>
        </section>

        <section class="gallery-section" id="ForYou">
            <div class="section-header">
                <h2 class="handwritten-title">For You</h2>
                <div class="line-deco"></div>
            </div>
            <div class="card-grid"></div>
        </section>

        <section class="gallery-section" id="Artist'sStory">
            <div class="section-header">
                <h2 class="handwritten-title">Artist's Story</h2>
                <div class="line-deco"></div>
            </div>
            <div class="ArtistsStory-grid"></div>
        </section>

        <section class="gallery-section" id="ArtStory">
            <div class="section-header">
                <h2 class="handwritten-title">Art Story</h2>
                <div class="line-deco"></div>
            </div>
            <div class="ArtStory-grid"></div>
        </section>

        <section class="gallery-section" id="Country'sStory">
            <div class="section-header">
                <h2 class="handwritten-title">Country's Story</h2>
                <div class="line-deco"></div>
            </div>
            <div class="CountrysStory-grid"></div>
        </section>

        <section class="gallery-section" id="ColorsPallets">
            <div class="section-header">
                <h2 class="handwritten-title">Color Palettes</h2>
                <div class="line-deco"></div>
            </div>
            <div class="ColorsPallets-grid"></div>
        </section>

    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>Copyright © 2026 Artist Gallery. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.querySelectorAll('.pill').forEach(pill => {
            pill.addEventListener('click', function () {
                document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>

</html>
