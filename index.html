<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fascinate&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icn.ico" type="image/x-icon">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <meta name="author" content="Rana Tamer">
    <meta name="description"
        content="Explore the creative portfolio of Rana Tamer. Discover art stories, artist journeys, cultural tales, and inspiring color palettes.">
    <meta name="keywords"
        content="art, artist, portfolio, Rana Tamer, art stories, color palettes, design, creative blog, drawing, painting">
</head>

<body>

    <header class="top-nav">
        <a href="" class="logo">
            <img src="images/rana-logo.png" alt="">
        </a>
        <div class="find-bar">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="filter-bar">
                <select name="" id="">
                    <option value="All" selected>All</option>
                </select>
            </div>
        </div>
        <nav class="filter-nav">
            <a href="#ForYou" class="pill">Posts</a>
            <a href="#Artist'sStory" class="pill">Artist's Story</a>
            <a href="#ArtStory" class="pill">Art Story</a>
            <a href="#Country'sStory" class="pill">Country's Story</a>
            <a href="#ColorsPallets" class="pill">Colors Pallets</a>
        </nav>
    </header>

    <main class="container">

        <section class="hero-banner">
            <img src="images/hero.png" alt="hero-banner">
        </section>

        <section class="for-you-section" id="ForYou">
            <h2 class="handwritten-title">For You:</h2>
            <div class="card-grid"></div>
        </section>

        <div class="bottom-layout"></div>

        <section class="for-you-section" id="Artist'sStory">
            <h2 class="handwritten-title">Artist's Story</h2>
            <div class="ArtistsStory-grid"></div>
        </section>

        <div class="bottom-layout"></div>

        <section class="for-you-section" id="ArtStory">
            <h2 class="handwritten-title">Art Story</h2>
            <div class="ArtStory-grid"></div>
        </section>

        <div class="bottom-layout"></div>

        <section class="for-you-section" id="Country'sStory">
            <h2 class="handwritten-title">Country's Story</h2>
            <div class="CountrysStory-grid"></div>
        </section>

        <div class="bottom-layout"></div>

        <section class="for-you-section" id="ColorsPallets">
            <h2 class="handwritten-title">Colors Pallets</h2>
            <div class="ColorsPallets-grid"></div>
        </section>

        <div class="bottom-layout"></div>

    </main>
    <div class="footer">
        <p>Copyright © 2026 Rana. All rights reserved.</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
